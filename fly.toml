# fly.toml app configuration file generated for moneytrack on 2026-07-08T10:44:25+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moneytrack'
primary_region = 'sin'

[build]
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.alive]
    port = 8000
    type = 'http'
    interval = '10s'
    timeout = '5s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
