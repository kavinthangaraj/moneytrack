<body class="min-h-screen" style="background:#c0c0c0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

        // ─── Config ─────────────────────────────────────────────────
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : ''; // Same origin by default; change to cloud URL when needed

        // ═══════════════════════════════════════════════════════════════
        // IndexedDB Offline Storage Layer
        // ═══════════════════════════════════════════════════════════════
        class LocalDB {
            constructor() {
                this.dbName = 'MoneyTrack';
                this.version = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => { this.db = request.result; resolve(); };
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        // Transactions store
                        if (!db.objectStoreNames.contains('transactions')) {
                            const txStore = db.createObjectStore('transactions', { keyPath: 'id' });
                            txStore.createIndex('date', 'date', { unique: false });
                            txStore.createIndex('category_id', 'category_id', { unique: false });
                            txStore.createIndex('account_id', 'account_id', { unique: false });
                        }
                        // Accounts store
                        if (!db.objectStoreNames.contains('accounts')) {
                            db.createObjectStore('accounts', { keyPath: 'id' });
                        }
                        // Categories store
                        if (!db.objectStoreNames.contains('categories')) {
                            db.createObjectStore('categories', { keyPath: 'id' });
                        }
                        // Sync queue store
                        if (!db.objectStoreNames.contains('sync_queue')) {
                            const syncStore = db.createObjectStore('sync_queue', { autoIncrement: true });
                            syncStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                    };
                });
            }

            _tx(storeName, mode = 'readonly') {
                const tx = this.db.transaction(storeName, mode);
                return tx.objectStore(storeName);
            }

            _promisify(request) {
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName) {
                if (!this.db) return [];
                const store = this._tx(storeName);
                return this._promisify(store.getAll());
            }

            async get(storeName, id) {
                if (!this.db) return null;
                const store = this._tx(storeName);
                return this._promisify(store.get(id));
            }

            async put(storeName, record) {
                if (!this.db) return null;
                const store = this._tx(storeName, 'readwrite');
                return this._promisify(store.put(record));
            }

            async delete(storeName, id) {
                if (!this.db) return null;
                const store = this._tx(storeName, 'readwrite');
                return this._promisify(store.delete(id));
            }

            async clear(storeName) {
                if (!this.db) return null;
                const store = this._tx(storeName, 'readwrite');
                return this._promisify(store.clear());
            }

            async putAll(storeName, records) {
                if (!this.db || !records.length) return;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    records.forEach(r => store.put(r));
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            async addToSyncQueue(item) {
                if (!this.db) return null;
                const record = { ...item, timestamp: Date.now() };
                const store = this._tx('sync_queue', 'readwrite');
                return this._promisify(store.add(record));
            }

            async getSyncQueue() {
                if (!this.db) return [];
                const store = this._tx('sync_queue');
                return this._promisify(store.getAll());
            }

            async clearSyncQueue() {
                return this.clear('sync_queue');
            }

            async deleteSyncQueueItem(id) {
                if (!this.db) return null;
                const store = this._tx('sync_queue', 'readwrite');
                return this._promisify(store.delete(id));
            }
        }

        // Global DB instance
        const localDB = new LocalDB();

        // ═══════════════════════════════════════════════════════════════
        // Sync Status Context
        // ═══════════════════════════════════════════════════════════════
        const SyncContext = createContext({ status: 'synced', pendingCount: 0, triggerSync: () => {} });

        // ═══════════════════════════════════════════════════════════════
        // Offline-First API Layer
        // ═══════════════════════════════════════════════════════════════
        const api = {
            // GET: try cloud first, fall back to IndexedDB
            get: async (url, storeName) => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    // Update local cache with fresh data
                    if (storeName && data) {
                        const records = Array.isArray(data) ? data
                            : data.transactions ? data.transactions
                            : data.accounts ? data.accounts
                            : data.categories ? data.categories
                            : null;
                        if (records && records.length > 0) {
                            await localDB.putAll(storeName, records.map(r => ({ ...r, _synced: true })));
                        }
                    }
                    return data;
                } catch (err) {
                    // Offline or server error — read from IndexedDB
                    if (storeName) {
                        return await localDB.getAll(storeName);
                    }
                    throw err;
                }
            },

            // POST: write to IndexedDB immediately, then try cloud
            post: async (url, data, storeName) => {
                // Generate a temporary local ID if no ID yet
                const localId = data.id || `local_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
                const record = { ...data, id: localId, _synced: false, _localId: localId };

                // Write to IndexedDB immediately
                if (storeName) {
                    await localDB.put(storeName, record);
                }

                // Try cloud
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data),
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const result = await res.json();
                    // Cloud succeeded — update local with server ID
                    if (storeName && result && result.id) {
                        await localDB.delete(storeName, localId);
                        await localDB.put(storeName, { ...result, _synced: true });
                    }
                    return result;
                } catch (err) {
                    // Offline — add to sync queue
                    await localDB.addToSyncQueue({ action: 'POST', store: storeName, data, localId });
                    return record;
                }
            },

            // PUT: update IndexedDB immediately, then try cloud
            put: async (url, data, storeName) => {
                const record = { ...data, _synced: false };

                // Write to IndexedDB immediately
                if (storeName && data.id) {
                    await localDB.put(storeName, record);
                }

                // Try cloud
                try {
                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data),
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const result = await res.json();
                    // Cloud succeeded — mark synced
                    if (storeName && result && result.id) {
                        await localDB.put(storeName, { ...result, _synced: true });
                    }
                    return result;
                } catch (err) {
                    // Offline — add to sync queue
                    await localDB.addToSyncQueue({ action: 'PUT', store: storeName, data, id: data.id });
                    return record;
                }
            },

            // DELETE: remove from IndexedDB immediately, then try cloud
            del: async (url, storeName, id) => {
                // Remove from IndexedDB immediately
                if (storeName && id) {
                    await localDB.delete(storeName, id);
                }

                // Try cloud
                try {
                    const res = await fetch(url, { method: 'DELETE' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (err) {
                    // Offline — add to sync queue
                    await localDB.addToSyncQueue({ action: 'DELETE', store: storeName, id });
                    return { ok: true, _offline: true };
                }
            },

            // Dashboard: try cloud, fall back to local computation
            getDashboard: async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/dashboard`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    // Cache all dashboard data into respective stores
                    if (data.recent) await localDB.putAll('transactions', data.recent.map(r => ({ ...r, _synced: true })));
                    return data;
                } catch (err) {
                    // Compute dashboard from local data
                    return await computeDashboardLocally();
                }
            },
        };

        // Local dashboard computation from IndexedDB
        async function computeDashboardLocally() {
            const transactions = await localDB.getAll('transactions');
            const categories = await localDB.getAll('categories');
            const accounts = await localDB.getAll('accounts');

            const now = new Date();
            const monthStart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
            const monthEnd = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-31`;

            const thisMonthTxs = transactions.filter(t => t.date >= monthStart && t.date <= monthEnd);
            const expenses = thisMonthTxs.filter(t => t.type === 'expense');
            const incomes = thisMonthTxs.filter(t => t.type === 'income');

            const thisMonth = expenses.reduce((s, t) => s + Number(t.amount || 0), 0);
            const thisMonthIncome = incomes.reduce((s, t) => s + Number(t.amount || 0), 0);
            const totalTransactions = transactions.length;
            const avgTransaction = totalTransactions > 0
                ? transactions.reduce((s, t) => s + Number(t.amount || 0), 0) / totalTransactions
                : 0;

            // Category breakdown
            const catMap = {};
            expenses.forEach(t => {
                const catId = t.category_id || 'uncategorized';
                catMap[catId] = (catMap[catId] || 0) + Number(t.amount || 0);
            });
            const catBreakdown = Object.entries(catMap).map(([catId, total]) => {
                const cat = categories.find(c => String(c.id) === String(catId));
                return { name: cat?.name || 'Uncategorized', total };
            }).sort((a, b) => b.total - a.total);

            const topCategory = catBreakdown[0]?.name || '';

            // Account breakdown
            const accMap = {};
            expenses.forEach(t => {
                const accId = t.account_id || 'unknown';
                accMap[accId] = (accMap[accId] || 0) + Number(t.amount || 0);
            });
            const accBreakdown = Object.entries(accMap).map(([accId, total]) => {
                const acc = accounts.find(a => String(a.id) === String(accId));
                return { name: acc?.name || 'Unknown', total };
            }).sort((a, b) => b.total - a.total);

            // Monthly breakdown (last 6 months)
            const monthlyMap = {};
            transactions.forEach(t => {
                if (t.type !== 'expense' || !t.date) return;
                const month = t.date.slice(0, 7);
                monthlyMap[month] = (monthlyMap[month] || 0) + Number(t.amount || 0);
            });
            const monthly = Object.entries(monthlyMap)
                .map(([month, expenses]) => ({ month, expenses }))
                .sort((a, b) => a.month.localeCompare(b.month))
                .slice(-6);

            // Recent transactions
            const recent = [...transactions]
                .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
                .slice(0, 5);

            return {
                this_month: thisMonth,
                this_month_income: thisMonthIncome,
                total_transactions: totalTransactions,
                avg_transaction: Math.round(avgTransaction),
                top_category: topCategory,
                categories: catBreakdown,
                accounts: accBreakdown,
                recent,
                monthly,
            };
        }

        // ═══════════════════════════════════════════════════════════════
        // Sync Engine
        // ═══════════════════════════════════════════════════════════════
        async function processSyncQueue() {
            if (!navigator.onLine) return { processed: 0, failed: 0 };

            const queue = await localDB.getSyncQueue();
            if (queue.length === 0) return { processed: 0, failed: 0 };

            let processed = 0;
            let failed = 0;

            for (const item of queue) {
                // Skip items with too many retries
                if (item.retries && item.retries >= 3) {
                    await localDB.deleteSyncQueueItem(item.timestamp || item.id);
                    continue;
                }
                try {
                    let url, method, body;

                    switch (item.action) {
                        case 'POST':
                            // Check if this was already synced (has server ID)
                            if (item.store && item.localId) {
                                const record = await localDB.get(item.store, item.localId);
                                if (record && record._synced) {
                                    await localDB.deleteSyncQueueItem(item.timestamp || item.id);
                                    processed++;
                                    continue;
                                }
                            }
                            url = item.store === 'accounts' ? `${API_BASE}/api/accounts`
                                : item.store === 'categories' ? `${API_BASE}/api/categories`
                                : `${API_BASE}/api/transactions`;
                            body = JSON.stringify(item.data);
                            method = 'POST';
                            break;
                        case 'PUT':
                            url = item.store === 'accounts' ? `${API_BASE}/api/accounts/${item.id}`
                                : item.store === 'categories' ? `${API_BASE}/api/categories/${item.id}`
                                : `${API_BASE}/api/transactions/${item.id}`;
                            body = JSON.stringify(item.data);
                            method = 'PUT';
                            break;
                        case 'DELETE':
                            url = item.store === 'accounts' ? `${API_BASE}/api/accounts/${item.id}`
                                : item.store === 'categories' ? `${API_BASE}/api/categories/${item.id}`
                                : `${API_BASE}/api/transactions/${item.id}`;
                            method = 'DELETE';
                            break;
                        default:
                            failed++;
                            continue;
                    }

                    const res = await fetch(url, {
                        method,
                        headers: method !== 'DELETE' ? { 'Content-Type': 'application/json' } : undefined,
                        body: method !== 'DELETE' ? body : undefined,
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    // If POST returned a server ID, update local record
                    if (item.action === 'POST' && item.store && item.localId) {
                        const result = await res.json();
                        if (result && result.id && result.id !== item.localId) {
                            await localDB.delete(item.store, item.localId);
                            await localDB.put(item.store, { ...result, _synced: true });
                        } else if (result && result.id) {
                            await localDB.put(item.store, { ...result, _synced: true });
                        }
                    } else if (item.action === 'PUT' && item.store && item.id) {
                        await localDB.put(item.store, { ...item.data, id: item.id, _synced: true });
                    }

                    await localDB.deleteSyncQueueItem(item.timestamp || item.id);
                    processed++;
                } catch (err) {
                    console.warn('Sync failed for item:', item, err);
                    // Remove 4xx client errors — they won't succeed on retry
                    const status = err.message?.match(/HTTP (\d+)/)?.[1];
                    if (status && parseInt(status) >= 400 && parseInt(status) < 500) {
                        await localDB.deleteSyncQueueItem(item.timestamp || item.id);
                    } else {
                        // Increment retry count for server errors
                        item.retries = (item.retries || 0) + 1;
                        await localDB.put('sync_queue', item);
                    }
                    failed++;
                }
            }

            return { processed, failed };
        }

        // ═══════════════════════════════════════════════════════════════
        // Charts
        // ═══════════════════════════════════════════════════════════════
        function DoughnutChart({ labels, data, colors, height }) {
            const ref = useRef(null);
            const chart = useRef(null);
            useEffect(() => {
                if (chart.current) chart.current.destroy();
                if (!ref.current || !data.length) return;
                chart.current = new Chart(ref.current, {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
                });
                return () => { if (chart.current) chart.current.destroy(); };
            }, [data]);
            return <div style={{height: height || '140px'}}><canvas ref={ref} /></div>;
        }

        function BarChart({ labels, data, color }) {
            const ref = useRef(null);
            const chart = useRef(null);
            useEffect(() => {
                if (chart.current) chart.current.destroy();
                if (!ref.current || !data.length) return;
                chart.current = new Chart(ref.current, {
                    type: 'bar',
                    data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 0, barThickness: 16 }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false, color: '#000000' }, border: { display: true, color: '#000000' }, ticks: { color: '#000000', font: { size: 9 } } },
                            y: { grid: { color: '#808080' }, border: { display: true, color: '#000000' }, ticks: { color: '#000000', font: { size: 9 }, callback: v => v >= 1000 ? (v/1000)+'k' : v } }
                        }
                    }
                });
                return () => { if (chart.current) chart.current.destroy(); };
            }, [data]);
            return <div style={{height: '140px'}}><canvas ref={ref} /></div>;
        }

        // ═══════════════════════════════════════════════════════════════
        // Transactions Page
        // ═══════════════════════════════════════════════════════════════
        function Transactions({ accounts, categories, onReload }) {
            const [txs, setTxs] = useState([]);
            const [total, setTotal] = useState(0);
            const [showForm, setShowForm] = useState(false);
            const [editing, setEditing] = useState(null);
            const [toast, setToast] = useState(null);
            const [showFilters, setShowFilters] = useState(false);
            const [f, setF] = useState({ start_date: thisMonthStart(), end_date: today(), category_id: '', account_id: '', tx_type: '', search: '' });

            const load = async () => {
                const p = new URLSearchParams();
                Object.entries(f).forEach(([k, v]) => { if (v) p.set(k, v); });
                p.set('limit', '200');
                try {
                    const d = await api.get(`/api/transactions?${p}`, 'transactions');
                    if (Array.isArray(d)) {
                        // Offline fallback — all transactions from IndexedDB
                        let filtered = d;
                        if (f.start_date) filtered = filtered.filter(t => t.date >= f.start_date);
                        if (f.end_date) filtered = filtered.filter(t => t.date <= f.end_date);
                        if (f.category_id) filtered = filtered.filter(t => String(t.category_id) === String(f.category_id));
                        if (f.account_id) filtered = filtered.filter(t => String(t.account_id) === String(f.account_id));
                        if (f.tx_type) filtered = filtered.filter(t => t.type === f.tx_type);
                        if (f.search) {
                            const s = f.search.toLowerCase();
                            filtered = filtered.filter(t => (t.merchant || '').toLowerCase().includes(s) || (t.description || '').toLowerCase().includes(s));
                        }
                        setTxs(filtered.sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 200));
                        setTotal(filtered.length);
                    } else {
                        setTxs(d.transactions || []);
                        setTotal(d.total || 0);
                    }
                } catch (err) {
                    // Complete fallback — read all from IndexedDB
                    const all = await localDB.getAll('transactions');
                    setTxs(all.sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 200));
                    setTotal(all.length);
                }
            };
            useEffect(() => { load(); }, [f]);
            const sf = (k, v) => setF(p => ({ ...p, [k]: v }));

            const handleSave = async (payload) => {
                try {
                    if (editing) {
                        await api.put(`${API_BASE}/api/transactions/${editing.id}`, payload, 'transactions');
                        setToast({ message: navigator.onLine ? 'Updated' : 'Saved offline', type: 'ok' });
                    } else {
                        await api.post(`${API_BASE}/api/transactions`, payload, 'transactions');
                        setToast({ message: navigator.onLine ? 'Saved' : 'Saved offline', type: 'ok' });
                    }
                    setShowForm(false); setEditing(null); load(); onReload();
                } catch (e) { setToast({ message: 'Failed', type: 'error' }); }
            };
            const handleDelete = async (id) => {
                if (!confirm('Delete?')) return;
                try {
                    await api.del(`${API_BASE}/api/transactions/${id}`, 'transactions', id);
                    setToast({ message: navigator.onLine ? 'Deleted' : 'Deleted offline', type: 'ok' });
                    load(); onReload();
                } catch (e) { setToast({ message: 'Failed', type: 'error' }); }
            };

            return (
                <div className="p-3 md:p-6 space-y-4 fade-in pt-16 md:pt-8 safe-top">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                    <div className="flex items-center justify-between px-2 pb-2 divider-95">

        // ═══════════════════════════════════════════════════════════════
        // SMS Parser
        // ═══════════════════════════════════════════════════════════════
        function SmsParser({ accounts, categories, onReload }) {
            const [smsText, setSmsText] = useState('');
            const [parsed, setParsed] = useState(null);
            const [saving, setSaving] = useState(false);
            const [toast, setToast] = useState(null);
            const [form, setForm] = useState({});
            const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

            const matchCat = (n) => { if (!n) return ''; const f = categories.find(c => c.name.toLowerCase() === n.toLowerCase()); return f ? f.id : ''; };
            const matchAcc = (lf, at) => { if (!lf && !at) return ''; const f = accounts.find(a => (lf && a.last_four === lf) || (at && a.type === at)); return f ? f.id : ''; };

            const handleParse = async () => {
                if (!smsText.trim()) return;
                try {
                    const r = await api.post(`${API_BASE}/api/sms/parse`, { text: smsText });
                    setParsed(r);
                    setForm({ amount: r.amount || '', merchant: r.merchant || '', date: r.date || today(), category_id: matchCat(r.category), account_id: matchAcc(r.last_four, r.account_type), type: 'expense', description: r.description || '' });
                } catch (e) { setToast({ message: 'Parse failed', type: 'error' }); }
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    await api.post(`${API_BASE}/api/transactions`, {
                        amount: Number(form.amount), merchant: form.merchant || '', date: form.date || today(),
                        category_id: form.category_id || null, account_id: form.account_id || null,
                        type: form.type || 'expense', description: form.description || '', sms_raw: smsText,
                    }, 'transactions');
                    setToast({ message: navigator.onLine ? 'Saved' : 'Saved offline', type: 'ok' }); setSmsText(''); setParsed(null); setForm({}); onReload();
                } catch (e) { setToast({ message: 'Failed', type: 'error' }); }
                setSaving(false);
            };

            return (
                <div className="p-3 md:p-6 space-y-4 fade-in pt-16 md:pt-8 safe-top">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                    <div className="px-2 pb-2 divider-95">
                        <h2 className="text-base font-bold uppercase tracking-wider" style={{textShadow: '1px 1px 0 #808080'}}>SMS Import</h2>
                        <p className="text-xs font-bold uppercase tracking-wider text-win95-dark mt-1">Paste a bank SMS. We extract the details.</p>
                    </div>

                    <div className="card-95 p-4 space-y-4">
                        <textarea value={smsText} onChange={e => { setSmsText(e.target.value); if (parsed) setParsed(null); }}
                            placeholder="Paste SMS here..."
                            className="input-95 h-28 font-mono resize-none" />
                        <button onClick={handleParse} disabled={!smsText.trim()}
                            className="btn-95 btn-95-purple w-full sm:w-auto disabled:opacity-30">
                            Parse SMS
                        </button>
                        {parsed && (
                            <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 badge-95 ${parsed.confidence === 'high' ? '' : ''}`}>
                                {parsed.confidence} confidence
                            </span>
                        )}
                    </div>

                    {parsed && (
                        <div className="card-95 p-4 space-y-4 fade-in">
                            <span className="label-95">Parsed result</span>

                            <div className="panel-95-sunken p-4">
                                <label className="label-95 mb-2">Amount (₹)</label>
                                <input type="number" step="0.01" min="0" value={form.amount} onChange={e => set('amount', e.target.value)}
                                    className="w-full bg-transparent text-2xl font-bold text-win95-text placeholder-win95-muted/30 outline-none tabular-nums" />
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <Input label="Date" type="date" value={form.date} onChange={e => set('date', e.target.value)} />
                                <Select label="Type" value={form.type} onChange={e => set('type', e.target.value)}>
                                    {TX_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                                </Select>
                            </div>

                            <Input label="Merchant" value={form.merchant} onChange={e => set('merchant', e.target.value)} />

                            <div className="grid grid-cols-2 gap-3">
                                <Select label="Category" value={form.category_id} onChange={e => set('category_id', e.target.value)}>
                                    <option value="">—</option>
                                    {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </Select>
                                <Select label="Account" value={form.account_id} onChange={e => set('account_id', e.target.value)}>
                                    <option value="">—</option>
                                    {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                </Select>
                            </div>

                            <Input label="Notes" value={form.description} onChange={e => set('description', e.target.value)} />

                            <div className="flex flex-wrap gap-2">
                                {parsed.bank && <span className="text-xs font-bold uppercase tracking-wider px-2 py-1 badge-95">{parsed.bank}</span>}
                                {parsed.upi_app && <span className="text-xs font-bold uppercase tracking-wider px-2 py-1 badge-95">{parsed.upi_app}</span>}
                                {parsed.last_four && <span className="text-xs font-bold uppercase tracking-wider px-2 py-1 badge-95">****{parsed.last_four}</span>}
                            </div>

                            <button onClick={handleSave} disabled={saving || !form.amount}
                                className="btn-95 btn-95-purple w-full disabled:opacity-30">
                                {saving ? 'Saving…' : 'Save Transaction'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // App Root
        // ═══════════════════════════════════════════════════════════════
        function App() {
            const [page, setPage] = useState('dashboard');
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [syncStatus, setSyncStatus] = useState('synced');
            const [pendingCount, setPendingCount] = useState(0);
            const [dbReady, setDbReady] = useState(false);

            // Initialize IndexedDB
            useEffect(() => {
                localDB.init()
                    .then(() => setDbReady(true))
                    .catch(err => console.error('IndexedDB init failed:', err));
            }, []);

            // Load data from IndexedDB first, then refresh from cloud
            const reloadAccounts = useCallback(async () => {
                try {
                    // Try cloud first
                    const data = await api.get(`${API_BASE}/api/accounts`, 'accounts');
                    const accList = Array.isArray(data) ? data : (data.accounts || []);
                    setAccounts(accList);
                } catch {
                    // Fall back to local
                    const local = await localDB.getAll('accounts');
                    setAccounts(local);
                }
            }, []);

            const reloadCategories = useCallback(async () => {
                try {
                    const data = await api.get(`${API_BASE}/api/categories`, 'categories');
                    const catList = Array.isArray(data) ? data : (data.categories || []);
                    setCategories(catList);
                } catch {
                    const local = await localDB.getAll('categories');
                    setCategories(local);
                }
            }, []);

            // Initial data load
            useEffect(() => {
                if (dbReady) {
                    reloadAccounts();
                    reloadCategories();
                }
            }, [dbReady]);

            // Sync on load and when online
            const triggerSync = useCallback(async () => {
                if (!navigator.onLine) {
                    setSyncStatus('offline');
                    const queue = await localDB.getSyncQueue();
                    setPendingCount(queue.length);
                    return;
                }

                const queue = await localDB.getSyncQueue();
                setPendingCount(queue.length);

                if (queue.length === 0) {
                    setSyncStatus('synced');
                    return;
                }

                setSyncStatus('syncing');
                const result = await processSyncQueue();
                const remaining = await localDB.getSyncQueue();
                setPendingCount(remaining.length);
                setSyncStatus(remaining.length === 0 ? 'synced' : 'pending');

                // Refresh data after sync
                if (result.processed > 0) {
                    reloadAccounts();
                    reloadCategories();
                }
            }, [reloadAccounts, reloadCategories]);

            // Trigger sync on load and online event
            useEffect(() => {
                if (dbReady) {
                    // Clear stale sync queue on startup — data is fetched fresh from server
                    localDB.clearSyncQueue().then(() => {
                        setPendingCount(0);
                        setSyncStatus(navigator.onLine ? 'synced' : 'offline');
                    });
                }
            }, [dbReady]);

            // Track online/offline status
            useEffect(() => {
                const checkStatus = () => {
                    if (!navigator.onLine) setSyncStatus('offline');
                };
                const handleOffline = () => setSyncStatus('offline');
                const handleOnline = () => { triggerSync(); };

                window.addEventListener('offline', handleOffline);
                window.addEventListener('online', handleOnline);
                checkStatus();

                return () => {
                    window.removeEventListener('offline', handleOffline);
                    window.removeEventListener('online', handleOnline);
                };
            }, [triggerSync]);

            if (!dbReady) {
                return <div className="flex items-center justify-center min-h-screen" style={{background: '#c0c0c0'}}>
                    <div className="card-95 p-6 text-center">
                        <span className="text-xs font-bold uppercase tracking-wider text-win95-text block">Loading MoneyTrack…</span>
                        <div className="progress-95-track mt-3 w-48 mx-auto">
                            <div className="progress-95-fill animate-pulse" style={{width: '60%'}} />
                        </div>
                    </div>
                </div>;
            }

            return (
                <SyncContext.Provider value={{ status: syncStatus, pendingCount, triggerSync }}>
                    <div className="flex min-h-screen">
                        <Sidebar page={page} setPage={setPage} open={sidebarOpen} setOpen={setSidebarOpen} />
                        <MobileHeader onMenuClick={() => setSidebarOpen(true)} page={page} />
                        <main className="flex-1 md:ml-56" style={{background: '#c0c0c0'}}>
                            <SyncIndicator />
                            {page === 'dashboard' && <Dashboard />}
                            {page === 'transactions' && <Transactions accounts={accounts} categories={categories} onReload={reloadAccounts} />}
                            {page === 'sms' && <SmsParser accounts={accounts} categories={categories} onReload={reloadAccounts} />}
                            {page === 'accounts' && <Accounts accounts={accounts} onReload={reloadAccounts} />}
                            {page === 'categories' && <Categories categories={categories} onReload={reloadCategories} />}
                        </main>
                    </div>
                </SyncContext.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
